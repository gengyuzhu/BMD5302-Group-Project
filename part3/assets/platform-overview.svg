  <text x="104" y="268" fill="#F5F0E8" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Client-Facing Web Experience</text>
  <text x="104" y="298" fill="#C6D2D9" font-family="Segoe UI, Arial, sans-serif" font-size="18">Default GitHub Pages landing view designed for demo, presentation, and portfolio use.</text>

  <rect x="104" y="326" width="258" height="56" rx="16" fill="#F5E7CF"/>
  <text x="128" y="360" fill="#1A2730" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">Investor Personas</text>
  <text x="128" y="385" fill="#566775" font-family="Segoe UI, Arial, sans-serif" font-size="16">Steady Saver, Balanced Builder, Growth Explorer, Bold Navigator</text>

  <rect x="394" y="326" width="258" height="56" rx="16" fill="#F5E7CF"/>
  <text x="418" y="360" fill="#1A2730" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">Recommendation Cockpit</text>
  <text x="418" y="385" fill="#566775" font-family="Segoe UI, Arial, sans-serif" font-size="16">Expected return, volatility, utility, and top current allocations</text>

  <rect x="684" y="326" width="258" height="56" rx="16" fill="#F5E7CF"/>
  <text x="708" y="360" fill="#1A2730" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">Frontier Visualization</text>
  <text x="708" y="385" fill="#566775" font-family="Segoe UI, Arial, sans-serif" font-size="16">Portfolio point on the efficient frontier for the selected client</text>

  <rect x="974" y="326" width="258" height="56" rx="16" fill="#F5E7CF"/>
  <text x="998" y="360" fill="#1A2730" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">AI Chatbot</text>
  <text x="998" y="385" fill="#566775" font-family="Segoe UI, Arial, sans-serif" font-size="16">Explains portfolios, funds, GMVP, risk aversion, and implementation logic</text>

