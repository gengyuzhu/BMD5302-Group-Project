<svg width="1400" height="860" viewBox="0 0 1400 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="60" x2="1280" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF8EE"/>
      <stop offset="1" stop-color="#F2E3CC"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFF7EA"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1E2A33"/>
      <stop offset="1" stop-color="#2F4657"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#24333F" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#7A5D43"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="860" rx="32" fill="url(#bg)"/>
  <circle cx="176" cy="108" r="96" fill="#F4E3C5" opacity="0.55"/>
  <circle cx="1244" cy="752" r="110" fill="#EAD2AF" opacity="0.45"/>

  <text x="70" y="78" fill="#687783" font-family="Segoe UI, Arial, sans-serif" font-size="18" letter-spacing="4">BMD5302 ROBOT ADVISER</text>
  <text x="70" y="132" fill="#15212B" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="700">Platform Overview</text>
  <text x="70" y="168" fill="#52636F" font-family="Segoe UI, Arial, sans-serif" font-size="22">Unified web platform connecting fund analytics, investor profiling, and AI-style explanation.</text>

