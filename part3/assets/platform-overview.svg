  <text x="128" y="620" fill="#1A2730" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Part 1: Frontier Lab</text>
  <text x="128" y="652" fill="#566775" font-family="Segoe UI, Arial, sans-serif" font-size="16">• Average returns</text>
  <text x="128" y="678" fill="#566775" font-family="Segoe UI, Arial, sans-serif" font-size="16">• Covariance matrix</text>
  <text x="128" y="704" fill="#566775" font-family="Segoe UI, Arial, sans-serif" font-size="16">• GMVP and frontier with / without short sales</text>

  <rect x="380" y="582" width="242" height="132" rx="20" fill="#FFFFFF" stroke="#D8CCB8"/>
  <text x="404" y="620" fill="#1A2730" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Part 2: Risk Lab</text>
  <text x="404" y="652" fill="#566775" font-family="Segoe UI, Arial, sans-serif" font-size="16">• 8-question risk questionnaire</text>
  <text x="404" y="678" fill="#566775" font-family="Segoe UI, Arial, sans-serif" font-size="16">• Score to A mapping</text>
  <text x="404" y="704" fill="#566775" font-family="Segoe UI, Arial, sans-serif" font-size="16">• Utility-maximizing portfolio recommendation</text>

