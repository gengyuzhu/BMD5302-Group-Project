  <text x="764" y="512" fill="#15212B" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Data and Computation Layer</text>
  <text x="764" y="544" fill="#586A76" font-family="Segoe UI, Arial, sans-serif" font-size="18">Single source of truth shared across Python analytics, React components, and GitHub Pages deployment.</text>

  <rect x="764" y="582" width="210" height="132" rx="20" fill="#FFFFFF" stroke="#D8CCB8"/>
  <text x="788" y="620" fill="#1A2730" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Source Data</text>
  <text x="788" y="652" fill="#566775" font-family="Segoe UI, Arial, sans-serif" font-size="16">10 CSV files</text>
  <text x="788" y="678" fill="#566775" font-family="Segoe UI, Arial, sans-serif" font-size="16">Monthly prices</text>
  <text x="788" y="704" fill="#566775" font-family="Segoe UI, Arial, sans-serif" font-size="16">Common window: 2022-03 to 2026-03</text>

  <rect x="1002" y="582" width="144" height="132" rx="20" fill="#FFFFFF" stroke="#D8CCB8"/>
  <text x="1030" y="620" fill="#1A2730" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Python</text>
  <text x="1030" y="652" fill="#566775" font-family="Segoe UI, Arial, sans-serif" font-size="16">NumPy</text>
  <text x="1030" y="678" fill="#566775" font-family="Segoe UI, Arial, sans-serif" font-size="16">Pandas</text>
  <text x="1030" y="704" fill="#566775" font-family="Segoe UI, Arial, sans-serif" font-size="16">SciPy</text>

  <rect x="1174" y="582" width="122" height="132" rx="20" fill="#FFFFFF" stroke="#D8CCB8"/>
  <text x="1198" y="620" fill="#1A2730" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">JSON</text>
  <text x="1198" y="652" fill="#566775" font-family="Segoe UI, Arial, sans-serif" font-size="16">Part 1 data</text>
  <text x="1198" y="678" fill="#566775" font-family="Segoe UI, Arial, sans-serif" font-size="16">Part 2 data</text>
  <text x="1198" y="704" fill="#566775" font-family="Segoe UI, Arial, sans-serif" font-size="16">Shared UI inputs</text>

  <path d="M370 614C696 614 696 614 724 614" stroke="#7A5D43" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M676 350C676 430 676 430 516 456" stroke="#7A5D43" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1020 350C1020 430 1020 430 1030 456" stroke="#7A5D43" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="70" y="815" fill="#687783" font-family="Segoe UI, Arial, sans-serif" font-size="16">Designed for GitHub Pages deployment, classroom presentation, and portfolio demonstration.</text>
